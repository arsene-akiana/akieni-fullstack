<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arsène's Hero Section</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet" />

    <!-- Liaison CSS : aucun style inline dans le HTML -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <!-- HEADER : barre de navigation en haut de la page -->
    <header id="navbar">
      <div id="navbar-brand">KodeVia</div>
      <nav>
        <ul>
          <li><a href="#hero">Home</a></li>
          <li><a href="#hero">Courses</a></li>
          <li><a href="#hero">About</a></li>
        </ul>
      </nav>
    </header>

    <!-- HERO SECTION : le haut de la page d'accueil -->
    <section id="hero">

      <!-- Contenu centré sur l'image de fond -->
      <div id="hero-content">

        <!-- Badge au dessus du titre -->
        <span class="hero-badge">🚀 Learn to code from scratch</span>

        <!-- Titre principal -->
        <h1 class="hero-title">
          Build the Web.<br/>
          Shape the Future.
        </h1>

        <!-- Sous-titre -->
        <p class="hero-subtitle">
          Join thousands of developers learning HTML, CSS, JavaScript and more
          at KodeVia — hands-on, project-based, and 100% practical.
        </p>

        <!-- Boutons d'appel à l'action (CTA : Call TO Action) -->
        <div id="hero-actions"> 
          <a href="#" class="btn-primary">Start Learning Free</a>
          <a href="#" class="btn-secondary">View Curriculum</a>
          
          <!-- href="#" : lien fictif — la page cible n'existe pas encore.
          Le # évite une erreur tout en gardant le comportement d'un lien. -->
        </div>

      </div>

    </section>

  </body>
</html>
